<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Segment Looper</h1>

    <div id="no-video" class="notice" hidden>
      <p>Open a YouTube video to use this extension.</p>
    </div>

    <div id="main-controls">
      <label for="segments-input">Segments</label>
      <textarea
        id="segments-input"
        placeholder="1:00-2:00, 3:00-4:00, 5:30-6:30"
        rows="3"
        spellcheck="false"
      ></textarea>

      <div class="actions">
        <button id="save-btn">Save</button>
        <div class="toggle-wrap">
          <span class="toggle-label">Loop</span>
          <label class="toggle">
            <input type="checkbox" id="enabled-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <p id="status" class="status"></p>
      <p id="error" class="error" hidden></p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Segment Looper</h1>

    <div id="no-video" class="notice" hidden>
      <p>Open a YouTube video to use this extension.</p>
    </div>

    <div id="main-controls">
      <div class="generate-section">
        <label>Auto-generate</label>
        <input
          type="text"
          id="instructions"
          placeholder="e.g. focus only on Iran topics, skip market talk"
          spellcheck="false"
        >
        <div class="generate-row">
          <input
            type="number"
            id="max-minutes"
            placeholder="Max min"
            min="1"
            max="120"
            title="Max total runtime in minutes (optional)"
          >
          <button id="generate-btn">Generate Segments</button>
        </div>
        <p id="generate-status" class="generate-status" hidden></p>
      </div>

      <div class="divider"></div>

      <label for="segments-input">Segments</label>
      <textarea
        id="segments-input"
        placeholder="1:00-2:00, 3:00-4:00, 5:30-6:30"
        rows="3"
        spellcheck="false"
      ></textarea>

      <div class="actions">
        <button id="save-btn">Save</button>
        <div class="toggle-wrap">
          <span class="toggle-label">Loop</span>
          <label class="toggle">
            <input type="checkbox" id="enabled-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <p id="status" class="status"></p>
      <p id="error" class="error" hidden></p>

      <div class="divider"></div>

      <div class="window-section">
        <div class="window-header">
          <label>Transcript window</label>
          <button id="full-video-btn" class="small-btn">Full video</button>
        </div>
        <div class="range-slider">
          <div class="range-slider-track"><div class="range-slider-fill" id="range-fill"></div></div>
          <input type="range" id="range-min" min="0" max="100" value="0" step="1">
          <input type="range" id="range-max" min="0" max="100" value="100" step="1">
        </div>
        <div class="range-labels">
          <input type="text" id="range-start-label" value="00:00" spellcheck="false">
          <input type="text" id="range-end-label" value="00:00" spellcheck="false">
        </div>
      </div>

      <div class="divider"></div>

      <div class="insights-section">
        <label>Video insights</label>
        <div class="insights-buttons">
          <button id="btn-detailed" class="insight-btn" data-type="detailed">Detailed Summary</button>
          <button id="btn-short" class="insight-btn" data-type="short">Short Summary</button>
          <button id="btn-pointers" class="insight-btn" data-type="key-pointers">Key Pointers</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="ask-section">
        <label>Ask about this video</label>
        <div class="ask-row">
          <input
            type="text"
            id="ask-input"
            placeholder="e.g. What are the key arguments about Iran?"
            spellcheck="false"
          >
          <button id="ask-btn">Ask</button>
        </div>
      </div>

      <div id="output-box" class="output-box" hidden></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
